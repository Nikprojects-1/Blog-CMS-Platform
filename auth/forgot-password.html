<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Niks Blog CMS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-container { width: 100%; max-width: 450px; padding: 2.5rem; }
        .form-group { margin-bottom: 2rem; position: relative; }
        .form-input { width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); color: white; outline: none; transition: var(--transition); }
        .form-input:focus { border-color: var(--primary); background: rgba(255,255,255,0.1); }
        .floating-label { position: absolute; left: 1rem; top: 1rem; color: var(--text-secondary); pointer-events: none; transition: var(--transition); }
        .form-input:focus + .floating-label, .form-input:not(:placeholder-shown) + .floating-label { top: -1.5rem; left: 0.2rem; font-size: 0.85rem; color: var(--accent); }
    </style>
</head>
<body>
    <div class="gradient-bg">
        <div class="gradient-sphere sphere-1"></div>
        <div class="gradient-sphere sphere-2"></div>
    </div>

    <div class="auth-container glass-card animate-fade">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <a href="../index.html" class="logo" style="font-size: 2rem;">Niks CMS</a>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Don't worry, even geniuses forget sometimes.</p>
        </div>

        <form id="forgotForm">
            <div class="form-group">
                <input type="email" id="email" class="form-input" placeholder=" " required>
                <label class="floating-label">Email Address</label>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">
                Send Reset Link <i class="fas fa-paper-plane"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; color: var(--text-secondary);">
            Remembered it? <a href="login.html" style="color: var(--accent); font-weight: 600;">Back to login</a>
        </div>
    </div>

    <script type="module">
        import { initCommon } from '../js/common.js';
        import { state } from '../js/state.js';
        initCommon(state);
        
        document.getElementById('forgotForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Password reset link sent to your email!');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
