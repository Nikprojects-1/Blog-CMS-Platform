<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Niks Blog CMS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .auth-container { width: 100%; max-width: 450px; padding: 2.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="gradient-bg">
        <div class="gradient-sphere sphere-1"></div>
        <div class="gradient-sphere sphere-2"></div>
    </div>

    <div class="auth-container glass-card animate-fade">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="../index.html" class="logo" style="font-size: 2rem;">Niks CMS</a>
            <p class="text-muted" style="margin-top: 0.5rem;">Create your free reader & writer account</p>
        </div>

        <form id="registerForm" autocomplete="off">
            <div class="form-group">
                <label for="name">Full name</label>
                <input type="text" id="name" class="form-input-pro" required autocomplete="name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-input-pro" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input-pro" required autocomplete="new-password" minlength="6">
                <p class="text-muted" style="font-size: 0.8rem; margin-top: 0.5rem;">At least 6 characters</p>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem; margin-top: 0.5rem;">
                Create Account <i class="fas fa-user-plus"></i>
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
            Already have an account? <a href="login.html" style="color: var(--accent); font-weight: 600;">Sign in</a>
        </div>

        <div style="text-align: center; margin-top: 1.25rem;">
            <a href="../index.html" class="text-muted" style="font-size: 0.9rem;"><i class="fas fa-home"></i> Back to Website</a>
        </div>
    </div>

    <script type="module">
        import { isValidEmail } from '../js/common.js';
        import { state } from '../js/state.js';

        if (state.isAuthenticated()) {
            window.location.href = '../user/dashboard.html';
        }

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!username) {
                alert('Please enter your full name.');
                return;
            }
            if (!isValidEmail(email)) {
                alert('Please enter a valid email address.');
                return;
            }
            if (password.length < 6) {
                alert('Password must be at least 6 characters.');
                return;
            }

            const user = state.register({ username, email, password });
            if (user) {
                window.location.href = '../user/dashboard.html';
            } else {
                alert('An account with this email already exists. Please sign in instead.');
            }
        });
    </script>
</body>
</html>
